<!DOCTYPE html>
<html>
  <head>
    <title>Happy day!</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      * {
        font-family: sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Happy day!</h1>
    <button onclick="blast()">Celebrate</button>
    <input id="colour" type="color"></input>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script>
      var color = document.getElementById("colour");
      
      function blast() {
  confetti({
    particleCount: 100,
    spread: 70,
    angle: 45,
    ticks: 500,
    colors: [color.value],
    origin: { y: 1, x: 0 }
  });
  confetti({
    particleCount: 100,
    spread: 70,
    angle: 135,
    ticks: 500,
    colors: [color.value],
    origin: { y: 1, x: 1 }
  });
  confetti({
    particleCount: 100,
    spread: 70,
    angle: 45,
    ticks: 500,
    colors: [color.value],
    origin: { y: 0, x: 0 }
  });
  confetti({
    particleCount: 100,
    spread: 70,
    angle: 135,
    ticks: 500,
    colors: [color.value],
    origin: { y: 0, x: 1 }
  });
}
    </script>
  </body>
</html>
